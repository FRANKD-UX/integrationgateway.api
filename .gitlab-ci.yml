stages:
  - build
  - test
  - publish
  - deploy

default:
  image: mcr.microsoft.com/dotnet/sdk:8.0
  tags:
    - docker
  cache:
    key: nuget
    paths:
      - .nuget/packages/

variables:
  NUGET_PACKAGES: "$CI_PROJECT_DIR/.nuget/packages"
  PROJECT_FILE: "IntegrationGateway.Api.csproj"
  PUBLISH_DIR: "publish"

before_script:
  - dotnet --info

build:
  stage: build
  script:
    - dotnet restore "$PROJECT_FILE"
    - dotnet build "$PROJECT_FILE" -c Release --no-restore
  artifacts:
    name: "$CI_PROJECT_NAME-build-$CI_COMMIT_SHORT_SHA"
    expire_in: 1 week
    paths:
      - bin/Release/

test:
  stage: test
  script:
    - dotnet restore "$PROJECT_FILE"
    - dotnet test "$PROJECT_FILE" -c Release --no-build --logger "trx;LogFileName=test-results.trx"
  artifacts:
    when: always
    name: "$CI_PROJECT_NAME-tests-$CI_COMMIT_SHORT_SHA"
    expire_in: 1 week
    paths:
      - "**/TestResults/"
      - "**/test-results.trx"

publish:
  stage: publish
  script:
    - dotnet restore "$PROJECT_FILE"
    - dotnet publish "$PROJECT_FILE" -c Release -o "$PUBLISH_DIR"
  artifacts:
    name: "$CI_PROJECT_NAME-publish-$CI_COMMIT_SHORT_SHA"
    expire_in: 2 weeks
    paths:
      - publish/

deploy-iis:
  stage: deploy
  script:
    - echo "Starting IIS deployment"
    - echo "Writing appsettings.json with environment configuration"

    - |
      cat > publish/appsettings.json << EOF
      {
        "ConnectionStrings": {
          "DefaultConnection": "${DB_CONNECTION_STRING}"
        },
        "Logging": {
          "LogLevel": {
            "Default": "Information",
            "Microsoft.AspNetCore": "Warning"
          }
        },
        "AllowedHosts": "*",
        "Graph": {
          "TenantId": "${GRAPH_TENANT_ID}",
          "ClientId": "${GRAPH_CLIENT_ID}",
          "ClientSecret": "${GRAPH_CLIENT_SECRET}",
          "SenderEmail": "${SENDER_EMAIL}"
        },
        "SharePoint": {
          "SiteUrl": "${SHAREPOINT_SITE_URL}",
          "ListId": "${SHAREPOINT_LIST_ID}"
        },
        "App": {
          "BaseUrl": "${APP_BASE_URL}"
        }
      }
      EOF

    - echo "appsettings.json written successfully"
    - echo "Deploy path is $DEPLOY_PATH"
    - rm -rf "$DEPLOY_PATH"/*
    - cp -r publish/* "$DEPLOY_PATH"/
    - echo "Deployment files copied successfully"
    - ls -la "$DEPLOY_PATH"
  dependencies:
    - publish
  environment:
    name: staging